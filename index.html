<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .btn-active:active { transform: scale(0.9); }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =====================================
        const ACCESS_KEY = "666888";         
        const ADMIN_PASSWORD = "fjm-300300"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwxevu6vFcL418-hEdLcVo9zsGGeNUFArv8Rmg2U7K1iigIwCpZFeCuT3LcS_h-7I4/exec";
        // =====================================

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [skipLoginMode, setSkipLoginMode] = useState(false);
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [copied, setCopied] = useState(null);
            const [visiblePwds, setVisiblePwds] = useState({});

            // 初始化：檢查雲端免登入設定
            useEffect(() => {
                const checkStatus = async () => {
                    try {
                        const r = await fetch(`${GAS_URL}?action=getConfig`);
                        const config = await r.json();
                        setSkipLoginMode(config.skipLogin);
                        // 若雲端開啟免登，或本地 Session 有記錄，則直接進入
                        if (config.skipLogin === true || sessionStorage.getItem('fjm_access') === 'true') {
                            setIsAccess(true);
                        }
                    } catch (e) { console.log("Config fetch skip"); }
                    setLoading(false);
                };
                checkStatus();
            }, []);

            // 抓取 Wi-Fi 清單
            useEffect(() => {
                if (isAccess) {
                    fetch(GAS_URL)
                        .then(r => r.json())
                        .then(j => { if (j.success) setData(j.data); })
                        .catch(e => console.error("Data load error"));
                }
            }, [isAccess]);

            const handleTabChange = (t) => {
                if (t === 'setup') setIsAdmin(false); // 切換到管理員分頁時強制鎖定
                setActiveTab(t);
            };

            const toggleGlobalSkip = async () => {
                if (updating) return;
                setUpdating(true);
                const target = !skipLoginMode;
                try {
                    const r = await fetch(`${GAS_URL}?action=updateConfig&skipLogin=${target}&pwd=${ADMIN_PASSWORD}`);
                    const res = await r.json();
                    if (res.success) setSkipLoginMode(target);
                } catch (e) { alert("雲端同步失敗"); }
                setUpdating(false);
            };

            const filtered = data.filter(i => (i.c + i.s).toLowerCase().includes(searchTerm.toLowerCase()));

            if (loading && !isAccess) return <div className="h-screen flex items-center justify-center font-black text-slate-300 animate-pulse text-lg tracking-tighter">FJM CLOUD 讀取中...</div>;

            // 登入介面 (超圓潤)
            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-8 animate-pop">
                        <div className="w-full max-w-sm bg-white rounded-[4.5rem] p-12 shadow-[0_40px_80px_-15px_rgba(0,0,0,0.1)] flex flex-col items-center gap-12">
                            <div className="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-indigo-100">
                                <svg className="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-800 tracking-tighter">存取認證</h2>
                            <input type="password" 
                                className="w-full p-8 bg-slate-50 border-none rounded-full text-center text-5xl font-black outline-none focus:ring-4 ring-indigo-500/10 placeholder:text-slate-200"
                                value={passInput} 
                                onChange={e => setPassInput(e.target.value)} 
                                onKeyDown={e => e.key === 'Enter' && (passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('密碼錯誤'))} 
                                placeholder="••••" 
                            />
                            <button onClick={() => passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('密碼錯誤')} 
                                className="w-full py-7 bg-slate-900 text-white rounded-full font-black text-2xl shadow-lg btn-active transition-all">
                                進入系統
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative overflow-hidden">
                        
                        {/* Header */}
                        <div className="px-10 pt-16 pb-10 border-b border-slate-50">
                            <div className="flex justify-between items-center mb-10">
                                <h1 className="text-4xl font-black text-slate-800 tracking-tighter">FJM Wi-Fi</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 btn-active font-black text-[10px] tracking-tighter">LOGOUT</button>
                            </div>
                            {activeTab === 'query' && (
                                <input type="text" placeholder="搜尋教室名稱..." 
                                    className="w-full px-10 py-6 bg-slate-100 rounded-full border-none font-bold outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all text-xl"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                                />
                            )}
                        </div>

                        {/* List Area */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/50">
                            {activeTab === 'query' ? (
                                <div className="p-8 space-y-6">
                                    {filtered.map(i => (
                                        <div key={i.s} className="p-8 bg-white rounded-[4rem] border border-slate-100 shadow-sm animate-pop">
                                            <div className="flex justify-between items-center mb-8">
                                                <div>
                                                    <div className="text-indigo-600 font-black text-3xl tracking-tighter">{i.c}</div>
                                                    <div className="text-slate-400 font-mono font-bold text-sm mt-1 tracking-widest uppercase">{i.s}</div>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => setVisiblePwds(p => ({...p, [i.s]: !p[i.s]}))} className={`px-8 py-5 rounded-full font-black text-sm transition-all btn-active ${visiblePwds[i.s] ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>顯示</button>
                                                    <button onClick={() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 1000); }}
                                                        className={`w-16 h-16 rounded-full flex items-center justify-center transition-all btn-active ${copied === i.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-600'}`}>
                                                        {copied === i.s ? '✓' : <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="14" x="8" y="8" rx="4" ry="4"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>}
                                                    </button>
                                                </div>
                                            </div>
                                            {visiblePwds[i.s] && <div className="w-full py-6 bg-indigo-50 rounded-[2.5rem] text-indigo-700 font-black text-center text-3xl tracking-[0.2em] animate-pop">{i.p}</div>}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full p-12 flex flex-col">
                                    {!isAdmin ? (
                                        <div className="my-auto space-y-10 animate-pop text-center">
                                            <h3 className="text-4xl font-black text-slate-800 tracking-tight">後台驗證</h3>
                                            <input type="password" placeholder="••••••••" 
                                                className="w-full p-8 bg-white border-none rounded-full text-center text-4xl font-black outline-none shadow-inner focus:ring-4 ring-indigo-600/10 transition-all"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('密碼錯誤'))} 
                                            />
                                            <button onClick={() => adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('密碼錯誤')} 
                                                className="w-full py-7 bg-indigo-600 text-white rounded-full font-black text-2xl shadow-lg btn-active transition-all">
                                                確認權限
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-pop">
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">系統設定</h2>
                                            <div className="p-12 bg-white border border-slate-100 rounded-[4.5rem] shadow-sm flex flex-col items-center gap-10">
                                                <div className="text-center">
                                                    <div className="text-2xl font-black text-slate-800 tracking-tighter">全域免登入</div>
                                                    <p className="text-slate-400 font-bold text-sm mt-3 uppercase tracking-widest">Public Access</p>
                                                </div>
                                                <button onClick={toggleGlobalSkip} 
                                                    className={`w-36 h-16 rounded-full relative transition-all duration-500 btn-active ${updating ? 'opacity-50' : ''} ${skipLoginMode ? 'bg-green-500 shadow-xl shadow-green-100' : 'bg-slate-200'}`}>
                                                    <div className={`absolute top-2 w-12 h-12 bg-white rounded-full shadow-lg transition-all duration-500 ${skipLoginMode ? 'right-2' : 'left-2'}`}>
                                                        {updating && <div className="w-full h-full border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>}
                                                    </div>
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Navigation Tabs */}
                        <div className="px-12 pt-6 pb-12 safe-bottom bg-white border-t border-slate-50 flex gap-8 shrink-0">
                            <button onClick={() => handleTabChange('query')} className={`flex-1 py-6 rounded-full flex items-center justify-center gap-3 transition-all btn-active ${activeTab === 'query' ? 'bg-slate-900 text-white shadow-2xl font-black scale-105' : 'text-slate-400 font-bold'}`}>
                                密碼庫
                            </button>
                            <button onClick={() => handleTabChange('setup')} className={`flex-1 py-6 rounded-full flex items-center justify-center gap-3 transition-all btn-active ${activeTab === 'setup' ? 'bg-slate-900 text-white shadow-2xl font-black scale-105' : 'text-slate-400 font-bold'}`}>
                                管理員
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
