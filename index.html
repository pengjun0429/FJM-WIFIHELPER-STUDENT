<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* 圓潤按鈕觸感 */
        .btn-active:active { transform: scale(0.92); }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =====================================
        const ACCESS_KEY = "666888";         
        const ADMIN_PASSWORD = "fjm-300300"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwxevu6vFcL418-hEdLcVo9zsGGeNUFArv8Rmg2U7K1iigIwCpZFeCuT3LcS_h-7I4/exec";
        // =====================================

        const Icons = {
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="18" height="11" x="3" y="11" rx="5" ry="5"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="14" x="8" y="8" rx="4" ry="4"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        };

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [skipLoginMode, setSkipLoginMode] = useState(false);
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [copied, setCopied] = useState(null);
            const [visiblePwds, setVisiblePwds] = useState({});

            // 1. 初始化：檢查全域狀態
            useEffect(() => {
                const checkConfig = async () => {
                    try {
                        const r = await fetch(`${GAS_URL}?action=getConfig`);
                        const config = await r.json();
                        setSkipLoginMode(config.skipLogin);
                        // 如果雲端開啟免登，或本地 Session 已過期
                        if (config.skipLogin === true || sessionStorage.getItem('fjm_access') === 'true') {
                            setIsAccess(true);
                        }
                    } catch (e) { console.error("Config failed"); }
                    setLoading(false);
                };
                checkConfig();
            }, []);

            // 2. 抓取資料
            useEffect(() => {
                if (isAccess) {
                    fetch(GAS_URL).then(r => r.json()).then(j => j.success && setData(j.data));
                }
            }, [isAccess]);

            const handleTabChange = (t) => {
                if (t === 'setup') setIsAdmin(false); // 切換即鎖定管理員
                setActiveTab(t);
            };

            const toggleGlobalSkip = async () => {
                if (updating) return;
                setUpdating(true);
                const target = !skipLoginMode;
                try {
                    const r = await fetch(`${GAS_URL}?action=updateConfig&skipLogin=${target}&pwd=${ADMIN_PASSWORD}`);
                    const res = await r.json();
                    if (res.success) setSkipLoginMode(target);
                } catch (e) { alert("同步失敗"); }
                setUpdating(false);
            };

            const filtered = data.filter(i => (i.c+i.s).toLowerCase().includes(searchTerm.toLowerCase()));

            if (loading && !isAccess) return <div className="h-screen flex items-center justify-center font-black text-slate-300 animate-pulse">Checking Cloud...</div>;

            // 登入畫面 (超圓潤設計)
            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-8 bg-slate-100 animate-pop">
                        <div className="w-full max-w-sm bg-white rounded-[4.5rem] p-12 shadow-2xl flex flex-col items-center gap-10">
                            <div className="w-24 h-24 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-xl shadow-indigo-100"><Icons.Lock /></div>
                            <div className="text-center">
                                <h2 className="text-4xl font-black text-slate-800 tracking-tighter">FJM Cloud</h2>
                                <p className="text-slate-400 font-bold mt-2">請驗證存取權限</p>
                            </div>
                            <input type="password" 
                                className="w-full p-8 bg-slate-50 border-none rounded-[3rem] text-center text-5xl font-black outline-none focus:ring-4 ring-indigo-500/10"
                                value={passInput} 
                                onChange={e => setPassInput(e.target.value)} 
                                onKeyDown={e => e.key === 'Enter' && (passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('密碼錯誤'))} 
                                placeholder="••••" 
                            />
                            <button onClick={() => passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('密碼錯誤')} 
                                className="w-full py-6 bg-slate-900 text-white rounded-full font-black text-xl shadow-lg btn-active transition-all">
                                進入系統
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative overflow-hidden">
                        
                        {/* Header */}
                        <div className="px-8 pt-14 pb-8 border-b border-slate-50">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter">FJM Wi-Fi</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 btn-active"><Icons.Lock /></button>
                            </div>
                            {activeTab === 'query' && (
                                <input type="text" placeholder="搜尋教室或 SSID..." 
                                    className="w-full px-8 py-5 bg-slate-100 rounded-full border-none font-bold outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all text-lg"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                                />
                            )}
                        </div>

                        {/* List */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/50">
                            {activeTab === 'query' ? (
                                <div className="p-6 space-y-5">
                                    {filtered.map(i => (
                                        <div key={i.s} className="p-7 bg-white rounded-[3.5rem] border border-slate-100 shadow-sm animate-pop">
                                            <div className="flex justify-between items-center mb-6">
                                                <div>
                                                    <div className="text-indigo-600 font-black text-2xl tracking-tight">{i.c}</div>
                                                    <div className="text-slate-400 font-mono font-bold text-xs mt-1 tracking-widest uppercase">{i.s}</div>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button onClick={() => setVisiblePwds(p => ({...p, [i.s]: !p[i.s]}))} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all btn-active ${visiblePwds[i.s] ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>顯示</button>
                                                    <button onClick={() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 2000); }}
                                                        className={`w-14 h-14 rounded-full flex items-center justify-center transition-all btn-active ${copied === i.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-600'}`}>
                                                        {copied === i.s ? '✓' : <Icons.Copy />}
                                                    </button>
                                                </div>
                                            </div>
                                            {visiblePwds[i.s] && <div className="w-full py-5 bg-indigo-50 rounded-[2.5rem] text-indigo-700 font-black text-center text-2xl tracking-[0.2em] animate-pop">{i.p}</div>}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full p-10 flex flex-col">
                                    {!isAdmin ? (
                                        <div className="my-auto space-y-10 animate-pop text-center">
                                            <h3 className="text-3xl font-black text-slate-800 tracking-tight">管理員認證</h3>
                                            <input type="password" placeholder="••••••••" 
                                                className="w-full p-8 bg-white border-2 border-slate-100 rounded-[3rem] text-center text-4xl font-black outline-none focus:border-indigo-600 transition-all"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('錯誤'))} 
                                            />
                                            <button onClick={() => adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('錯誤')} 
                                                className="w-full py-6 bg-indigo-600 text-white rounded-full font-black text-xl shadow-lg btn-active">
                                                驗證後台
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-8 animate-pop">
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">後台設定</h2>
                                            <div className="p-10 bg-white border border-slate-100 rounded-[4rem] shadow-sm flex flex-col items-center gap-8">
                                                <div className="text-center">
                                                    <div className="text-xl font-black text-slate-800">全域免登入模式</div>
                                                    <p className="text-slate-400 font-bold text-sm mt-2">開啟後所有人皆免輸入密碼</p>
                                                </div>
                                                <button onClick={toggleGlobalSkip} 
                                                    className={`w-28 h-14 rounded-full relative transition-all duration-300 btn-active ${updating ? 'opacity-50' : ''} ${skipLoginMode ? 'bg-green-500 shadow-lg shadow-green-100' : 'bg-slate-200'}`}>
                                                    <div className={`absolute top-2 w-10 h-10 bg-white rounded-full shadow-md transition-all duration-300 ${skipLoginMode ? 'right-2' : 'left-2'}`}>
                                                        {updating && <div className="w-full h-full border-2 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>}
                                                    </div>
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Tabs */}
                        <div className="px-10 pt-4 pb-10 safe-bottom bg-white border-t border-slate-50 flex gap-6 shrink-0">
                            <button onClick={() => handleTabChange('query')} className={`flex-1 py-5 rounded-full flex items-center justify-center gap-3 transition-all btn-active ${activeTab === 'query' ? 'bg-slate-900 text-white shadow-xl font-black scale-105' : 'text-slate-400 font-bold'}`}>
                                <Icons.Search /> 密碼庫
                            </button>
                            <button onClick={() => handleTabChange('setup')} className={`flex-1 py-5 rounded-full flex items-center justify-center gap-3 transition-all btn-active ${activeTab === 'setup' ? 'bg-slate-900 text-white shadow-xl font-black scale-105' : 'text-slate-400 font-bold'}`}>
                                <Icons.Settings /> 管理員
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
