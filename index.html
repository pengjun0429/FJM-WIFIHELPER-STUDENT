<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .btn-round:active { transform: scale(0.92); transition: 0.1s; }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // =====================================
        const ACCESS_KEY = "666888";         // 進入網頁的密碼
        const ADMIN_PASSWORD = "fjm-300300"; // 管理員功能密碼
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwxevu6vFcL418-hEdLcVo9zsGGeNUFArv8Rmg2U7K1iigIwCpZFeCuT3LcS_h-7I4/exec";
        // =====================================

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [skipLoginMode, setSkipLoginMode] = useState(false);
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [copied, setCopied] = useState(null);
            const [visiblePwds, setVisiblePwds] = useState({});

            // 向 GAS 抓取資料的通用函式
            const fetchFromGAS = useCallback(async (params = "") => {
                try {
                    const response = await fetch(`${GAS_URL}${params}`, { method: 'GET', cache: 'no-store' });
                    return await response.json();
                } catch (e) { return null; }
            }, []);

            // 1. 初始化：對接 GAS 的 getConfig
            useEffect(() => {
                const init = async () => {
                    const config = await fetchFromGAS("?action=getConfig");
                    if (config) {
                        setSkipLoginMode(config.skipLogin);
                        // 如果雲端開啟免登，或本地 Session 已過期
                        if (config.skipLogin === true || sessionStorage.getItem('fjm_access') === 'true') {
                            setIsAccess(true);
                        }
                    }
                    setLoading(false);
                };
                init();
            }, [fetchFromGAS]);

            // 2. 登入後抓取 Wi-Fi 清單 (對接 GAS 預設動作)
            useEffect(() => {
                if (isAccess) {
                    fetchFromGAS().then(res => {
                        if (res && res.success) setData(res.data);
                    });
                }
            }, [isAccess, fetchFromGAS]);

            // 管理員功能：切換全域免登入 (對接 GAS 的 updateConfig)
            const toggleGlobalSkip = async () => {
                if (updating) return;
                setUpdating(true);
                const target = !skipLoginMode;
                const res = await fetchFromGAS(`?action=updateConfig&skipLogin=${target}&pwd=${ADMIN_PASSWORD}`);
                if (res && res.success) {
                    setSkipLoginMode(target);
                } else {
                    alert(res?.msg || "同步失敗");
                }
                setUpdating(false);
            };

            const handleLogin = () => {
                if (passInput === ACCESS_KEY) {
                    setIsAccess(true);
                    sessionStorage.setItem('fjm_access', 'true');
                } else {
                    alert("存取密碼錯誤");
                }
            };

            const filtered = data.filter(i => 
                (String(i.c) + String(i.s)).toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (loading && !isAccess) return <div className="h-screen flex items-center justify-center font-black text-slate-300 animate-pulse text-xl">FJM CLOUD 讀取中...</div>;

            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-8 animate-pop">
                        <div className="w-full max-w-sm bg-white rounded-[4rem] p-12 shadow-2xl flex flex-col items-center gap-10">
                            <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg">
                                <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-800 tracking-tighter">FJM 認證</h2>
                            <input type="password" 
                                className="w-full p-8 bg-slate-50 border-none rounded-full text-center text-4xl font-black outline-none focus:ring-4 ring-indigo-500/10 placeholder:text-slate-200"
                                value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} placeholder="••••" 
                            />
                            <button onClick={handleLogin} className="w-full py-6 bg-slate-900 text-white rounded-full font-black text-xl btn-round shadow-lg">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative overflow-hidden">
                        
                        <div className="px-10 pt-16 pb-8 border-b border-slate-50">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter text-indigo-600">FJM Cloud</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-black text-[10px] btn-round tracking-tighter">OFF</button>
                            </div>
                            {activeTab === 'query' && (
                                <input type="text" placeholder="搜尋教室..." 
                                    className="w-full px-8 py-5 bg-slate-100 rounded-full border-none font-bold outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all text-lg"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                                />
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto bg-slate-50/50">
                            {activeTab === 'query' ? (
                                <div className="p-6 space-y-5">
                                    {data.length === 0 && <div className="text-center py-20 text-slate-300 font-bold animate-pulse">連線至 Google App...</div>}
                                    {filtered.map(i => (
                                        <div key={i.s} className="p-8 bg-white rounded-[3.5rem] border border-slate-100 shadow-sm animate-pop">
                                            <div className="flex justify-between items-center mb-6">
                                                <div>
                                                    <div className="text-slate-800 font-black text-3xl tracking-tighter">{i.c}</div>
                                                    <div className="text-slate-400 font-mono font-bold text-xs mt-1 tracking-widest uppercase">{i.s}</div>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button onClick={() => setVisiblePwds(p => ({...p, [i.s]: !p[i.s]}))} className={`px-6 py-4 rounded-full font-black text-xs transition-all btn-round ${visiblePwds[i.s] ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-slate-100 text-slate-400'}`}>密碼</button>
                                                    <button onClick={() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 1000); }}
                                                        className={`w-14 h-14 rounded-full flex items-center justify-center transition-all btn-round ${copied === i.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-600'}`}>
                                                        {copied === i.s ? '✓' : <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="14" x="8" y="8" rx="4" ry="4"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>}
                                                    </button>
                                                </div>
                                            </div>
                                            {visiblePwds[i.s] && <div className="w-full py-5 bg-indigo-50 rounded-[2.5rem] text-indigo-700 font-black text-center text-3xl tracking-widest animate-pop">{i.p}</div>}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full p-12 flex flex-col">
                                    {!isAdmin ? (
                                        <div className="my-auto space-y-10 animate-pop text-center">
                                            <h3 className="text-3xl font-black text-slate-800 tracking-tight text-center">後台認證</h3>
                                            <input type="password" placeholder="管理員密碼" 
                                                className="w-full p-8 bg-white border-none rounded-full text-center text-4xl font-black outline-none shadow-inner focus:ring-4 ring-indigo-600/10 transition-all"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert("錯誤"))} 
                                            />
                                            <button onClick={() => adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert("錯誤")} className="w-full py-6 bg-indigo-600 text-white rounded-full font-black text-xl btn-round shadow-lg">進入管理模式</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-10 animate-pop">
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">後台系統</h2>
                                            <div className="p-12 bg-white border border-slate-100 rounded-[4.5rem] shadow-sm flex flex-col items-center gap-10">
                                                <div className="text-center">
                                                    <div className="text-2xl font-black text-slate-800">全域免登入開關</div>
                                                    <p className="text-slate-400 font-bold text-sm mt-2">連動 Google App 設定</p>
                                                </div>
                                                <button onClick={toggleGlobalSkip} 
                                                    className={`w-36 h-16 rounded-full relative transition-all duration-500 btn-round ${updating ? 'opacity-50' : ''} ${skipLoginMode ? 'bg-green-500 shadow-xl shadow-green-100' : 'bg-slate-200'}`}>
                                                    <div className={`absolute top-2 w-12 h-12 bg-white rounded-full shadow-lg transition-all duration-500 ${skipLoginMode ? 'right-2' : 'left-2'}`}>
                                                        {updating && <div className="w-full h-full border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>}
                                                    </div>
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="px-12 pt-6 pb-12 safe-bottom bg-white border-t border-slate-50 flex gap-8 shrink-0">
                            <button onClick={() => {setActiveTab('query'); setIsAdmin(false);}} className={`flex-1 py-6 rounded-full flex items-center justify-center gap-3 transition-all btn-round ${activeTab === 'query' ? 'bg-slate-900 text-white shadow-xl font-black scale-105' : 'text-slate-400 font-bold'}`}>密碼庫</button>
                            <button onClick={() => {setActiveTab('setup'); setIsAdmin(false);}} className={`flex-1 py-6 rounded-full flex items-center justify-center gap-3 transition-all btn-round ${activeTab === 'setup' ? 'bg-slate-900 text-white shadow-xl font-black scale-105' : 'text-slate-400 font-bold'}`}>管理員</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
