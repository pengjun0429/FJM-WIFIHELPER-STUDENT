<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM WIFI 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; margin: 0; overflow: hidden; }
        .safe-bottom { padding-bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px)); }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // 您的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5AmcAwSnAOE-Khz9t2dCIzyHugcADSMKJYk4WQGbc3srurSMxIR8DcxNjd6tSchRy/exec";

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [isVerifyEnabled, setIsVerifyEnabled] = useState(true);
            const [isSetupAuthenticated, setIsSetupAuthenticated] = useState(false);
            const [activeTab, setActiveTab] = useState('list');
            const [wifiList, setWifiList] = useState([]);
            const [passwordInput, setPasswordInput] = useState('');
            const [newAdminPwd, setNewAdminPwd] = useState('');
            const [loading, setLoading] = useState(true);

            // 1. 初始化：檢查是否需要驗證密碼
            useEffect(() => {
                checkSettings();
            }, []);

            const checkSettings = () => {
                fetch(`${GAS_URL}?action=getSettings`)
                    .then(res => res.json())
                    .then(data => {
                        setIsVerifyEnabled(data.verifyEnabled);
                        // 如果不需要驗證，或者這節期間已經解鎖過
                        if (!data.verifyEnabled || sessionStorage.getItem('fjm_auth') === 'true') {
                            setIsLocked(false);
                            fetchWifiData();
                        }
                        setLoading(false);
                    });
                if (sessionStorage.getItem('fjm_admin_auth') === 'true') setIsSetupAuthenticated(true);
            };

            const fetchWifiData = () => {
                fetch(GAS_URL).then(res => res.json()).then(data => {
                    if (data.success) setWifiList(data.data);
                });
            };

            // 2. 處理解鎖 (進入系統 或 進入管理模式)
            const handleVerify = (target) => {
                fetch(`${GAS_URL}?action=verify&pwd=${passwordInput}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.match) {
                            if (target === 'app') {
                                setIsLocked(false);
                                sessionStorage.setItem('fjm_auth', 'true');
                                fetchWifiData();
                            } else {
                                setIsSetupAuthenticated(true);
                                sessionStorage.setItem('fjm_admin_auth', 'true');
                            }
                            setPasswordInput('');
                        } else {
                            alert('密碼不正確');
                        }
                    });
            };

            // 3. 管理功能：切換開關與改密碼
            const toggleSystemVerify = (status) => {
                setIsVerifyEnabled(status);
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'toggleVerify', enabled: status })
                });
            };

            const updateAdminPassword = () => {
                if (!newAdminPwd) return alert('請輸入新密碼');
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'updateSystemPassword', newPwd: newAdminPwd })
                }).then(() => {
                    alert('系統密碼已更新');
                    setNewAdminPwd('');
                });
            };

            // 載入中畫面
            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400">讀取系統設定...</div>;

            // 進入密碼鎖定畫面
            if (isLocked && isVerifyEnabled) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center p-10 animate-in">
                    <div className="mb-8 w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <h1 className="text-white text-2xl font-black mb-10">FJM WIFI 系統已鎖定</h1>
                    <input 
                        type="password" 
                        placeholder="請輸入存取密碼" 
                        className="w-full max-w-xs p-5 bg-white/10 border border-white/20 rounded-2xl text-white text-center text-2xl outline-none focus:border-blue-500 mb-4"
                        value={passwordInput}
                        onChange={e => setPasswordInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && handleVerify('app')}
                    />
                    <button onClick={() => handleVerify('app')} className="w-full max-w-xs py-5 bg-blue-600 text-white rounded-2xl font-black text-lg active:scale-95 transition-all">解鎖進入</button>
                </div>
            );

            return (
                <div className="h-screen flex justify-center bg-slate-200">
                    <div className="w-full sm:max-w-md bg-white flex flex-col relative shadow-xl">
                        
                        {/* 頂部標題 */}
                        <div className="p-6 border-b flex justify-between items-center bg-white">
                            <h1 className="text-2xl font-black text-slate-800">FJM WIFI</h1>
                            <button 
                                onClick={() => setActiveTab(activeTab === 'list' ? 'admin' : 'list')}
                                className="text-slate-400 font-bold hover:text-blue-600 transition-colors"
                            >
                                {activeTab === 'list' ? '管理系統' : '回首頁'}
                            </button>
                        </div>

                        {/* 內容區 */}
                        <div className="flex-1 overflow-y-auto p-4">
                            {activeTab === 'list' ? (
                                <div className="space-y-3 animate-in">
                                    {wifiList.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold italic">目前沒有可用的密碼資料</div>
                                    ) : wifiList.map((item, index) => (
                                        <div key={index} className="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center group">
                                            <span className="font-mono text-xl font-black text-slate-700 tracking-wider">{item.p}</span>
                                            <button 
                                                onClick={() => {
                                                    navigator.clipboard.writeText(item.p);
                                                    alert('密碼已複製！');
                                                }}
                                                className="bg-blue-100 text-blue-600 px-5 py-2 rounded-xl font-black active:bg-blue-600 active:text-white transition-all"
                                            >
                                                複製
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="space-y-6 animate-in p-2">
                                    {!isSetupAuthenticated ? (
                                        <div className="py-10 flex flex-col items-center gap-6">
                                            <p className="font-black text-slate-400">請驗證管理員身份</p>
                                            <input 
                                                type="password" 
                                                placeholder="管理密碼" 
                                                className="w-full p-4 border-2 rounded-2xl text-center font-bold"
                                                value={passwordInput}
                                                onChange={e => setPasswordInput(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleVerify('setup')}
                                            />
                                            <button onClick={() => handleVerify('setup')} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black">登入管理模式</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-8">
                                            <div className="bg-blue-50 p-6 rounded-3xl flex items-center justify-between border-2 border-blue-100">
                                                <div>
                                                    <p className="font-black text-blue-900">啟動系統密碼鎖</p>
                                                    <p className="text-xs text-blue-700 font-bold">關閉後任何人開啟網頁即可直接查看</p>
                                                </div>
                                                <input 
                                                    type="checkbox" 
                                                    className="w-7 h-7 accent-blue-600"
                                                    checked={isVerifyEnabled}
                                                    onChange={e => toggleSystemVerify(e.target.checked)}
                                                />
                                            </div>
                                            <div className="bg-white border-2 border-slate-100 p-6 rounded-3xl space-y-4">
                                                <p className="font-black text-slate-800">修改進入/管理密碼</p>
                                                <div className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        placeholder="輸入新密碼" 
                                                        className="flex-1 p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-blue-500"
                                                        value={newAdminPwd}
                                                        onChange={e => setNewAdminPwd(e.target.value)}
                                                    />
                                                    <button onClick={updateAdminPassword} className="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black">儲存</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 底部導覽 */}
                        <div className="bg-white border-t p-4 safe-bottom text-center">
                            <p className="text-[10px] text-slate-300 font-bold tracking-widest uppercase">FJM Cloud System - Secured</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
