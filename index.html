<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM WIFI 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 您的定位 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5AmcAwSnAOE-Khz9t2dCIzyHugcADSMKJYk4WQGbc3srurSMxIR8DcxNjd6tSchRy/exec";

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [isVerifyOn, setIsVerifyOn] = useState(true);
            const [isSetupAuth, setIsSetupAuth] = useState(false);
            const [tab, setTab] = useState('list');
            const [data, setData] = useState([]);
            const [search, setSearch] = useState('');
            const [input, setInput] = useState('');
            const [newAdminPwd, setNewAdminPwd] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch(`${GAS_URL}?action=getSettings`)
                    .then(r => r.json())
                    .then(j => {
                        setIsVerifyOn(j.verifyEnabled);
                        if (!j.verifyEnabled || sessionStorage.getItem('fjm_wifi_auth') === 'true') {
                            setIsLocked(false);
                            loadData();
                        }
                        setLoading(false);
                    }).catch(() => setLoading(false));
                if (sessionStorage.getItem('fjm_admin_auth') === 'true') setIsSetupAuth(true);
            }, []);

            const loadData = () => {
                fetch(GAS_URL).then(r => r.json()).then(j => {
                    if (j.success) setData(j.data);
                });
            };

            const handleVerify = (target) => {
                fetch(`${GAS_URL}?action=verify&pwd=${input}`)
                    .then(r => r.json())
                    .then(j => {
                        if (j.match) {
                            if (target === 'app') {
                                setIsLocked(false);
                                sessionStorage.setItem('fjm_wifi_auth', 'true');
                                loadData();
                            } else {
                                setIsSetupAuth(true);
                                sessionStorage.setItem('fjm_admin_auth', 'true');
                            }
                            setInput('');
                        } else { alert('密碼錯誤'); }
                    });
            };

            const filteredData = useMemo(() => {
                return data.filter(i => i.c.toLowerCase().includes(search.toLowerCase()));
            }, [data, search]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400">載入中...</div>;

            if (isLocked && isVerifyOn) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center p-8 text-white animate-in">
                    <div className="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-2xl shadow-blue-500/20">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <h1 className="text-2xl font-black mb-10 tracking-widest">系統已受密碼保護</h1>
                    <input type="password" placeholder="輸入存取密碼" className="w-full max-w-xs p-5 rounded-2xl bg-white/10 text-center text-2xl outline-none border border-white/20 mb-4 focus:border-blue-500" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleVerify('app')}/>
                    <button onClick={() => handleVerify('app')} className="w-full max-w-xs py-5 bg-blue-600 rounded-2xl font-black text-lg active:scale-95">解鎖</button>
                </div>
            );

            return (
                <div className="h-screen flex justify-center bg-slate-100">
                    <div className="w-full sm:max-w-md bg-white flex flex-col relative shadow-xl">
                        <div className="p-6 border-b sticky top-0 bg-white z-10">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-black text-slate-800">FJM WIFI</h1>
                                <button onClick={() => setTab(tab === 'list' ? 'admin' : 'list')} className="text-blue-600 font-bold px-3 py-1 rounded-lg">
                                    {tab === 'list' ? '管理' : '返回'}
                                </button>
                            </div>
                            {tab === 'list' && (
                                <input type="text" placeholder="搜尋教室或班級..." className="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none focus:bg-white border-2 border-transparent focus:border-blue-500 transition-all" value={search} onChange={e => setSearch(e.target.value)} />
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto p-4">
                            {tab === 'list' ? (
                                <div className="space-y-3 animate-in">
                                    {filteredData.map((item, idx) => (
                                        <div key={idx} className="p-5 bg-slate-50 rounded-2xl flex justify-between items-center border border-slate-100">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] font-black text-blue-500 tracking-widest uppercase">Classroom</span>
                                                <span className="text-xl font-black text-slate-800">{item.c}</span>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <span className="font-mono font-bold text-slate-400 bg-white px-3 py-1 rounded-lg border text-sm">{item.p}</span>
                                                <button onClick={() => { navigator.clipboard.writeText(item.p); alert('已複製密碼！'); }} className="bg-blue-600 text-white px-5 py-2 rounded-xl font-black active:scale-90 transition-all">複製</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="space-y-6 p-2 animate-in">
                                    {!isSetupAuth ? (
                                        <div className="py-10 space-y-4 flex flex-col items-center">
                                            <p className="font-black text-slate-400 text-sm">管理員身分驗證</p>
                                            <input type="password" placeholder="管理密碼" className="w-full p-4 border-2 rounded-2xl text-center font-bold" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleVerify('admin')}/>
                                            <button onClick={() => handleVerify('admin')} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-black">登入</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="flex items-center justify-between p-6 bg-blue-50 rounded-3xl border border-blue-100">
                                                <div>
                                                    <p className="font-black text-blue-900">系統存取驗證</p>
                                                    <p className="text-xs text-blue-700 font-bold italic">關閉後任何人可直接查看</p>
                                                </div>
                                                <input type="checkbox" className="w-7 h-7 accent-blue-600" checked={isVerifyOn} onChange={e => {
                                                    const s = e.target.checked;
                                                    setIsVerifyOn(s);
                                                    fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'toggleVerify', enabled: s})});
                                                }} />
                                            </div>
                                            <div className="p-6 bg-white border-2 border-slate-100 rounded-3xl space-y-4">
                                                <p className="font-black text-slate-800">修改密碼</p>
                                                <div className="flex gap-2">
                                                    <input type="text" placeholder="輸入新密碼" className="flex-1 p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-blue-500" value={newAdminPwd} onChange={e=>setNewAdminPwd(e.target.value)} />
                                                    <button onClick={() => {
                                                        if(!newAdminPwd) return;
                                                        fetch(GAS_URL, {method:'POST', body: JSON.stringify({action:'updateSystemPassword', newPwd: newAdminPwd})}).then(()=>alert('修改成功'));
                                                    }} className="bg-blue-600 text-white px-6 py-4 rounded-2xl font-black">儲存</button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                        <div className="bg-white border-t p-4 safe-bottom text-center">
                            <span className="text-[10px] text-slate-300 font-black tracking-[0.3em] uppercase">FJM Cloud WIFI</span>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
