<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi 密碼查詢系統</title>
    <style>
        /* 星空背景特效 */
        body {
            margin: 0;
            background: #020b16;
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 霓虹標題 */
        .title {
            font-size: 2.5em;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            margin: 40px 0;
            letter-spacing: 5px;
        }

        /* 登入區塊 */
        #login-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            text-align: center;
            margin-top: 10vh;
            backdrop-filter: blur(10px);
        }

        input {
            background: transparent;
            border: 1px solid #00f3ff;
            color: #fff;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            width: 220px;
            font-size: 1.1em;
            text-align: center;
        }

        .login-btn {
            background: #00f3ff;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        .login-btn:hover {
            box-shadow: 0 0 25px #00f3ff;
            transform: scale(1.05);
        }

        /* Wi-Fi 卡片展示區 */
        #main-content {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .wifi-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00f3ff;
            border-radius: 15px;
            padding: 25px;
            width: 280px;
            text-align: center;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .wifi-card:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            transform: translateY(-10px);
        }

        .classroom-name {
            font-size: 1.5em;
            color: #00f3ff;
            margin-bottom: 10px;
        }

        .qr-code {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            width: 160px;
        }

        .copy-button {
            background: linear-gradient(45deg, #00f3ff, #ff00ff);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* 載入動畫 */
        #loader {
            display: none;
            color: #00f3ff;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1 class="title">WIFI PASSWORDS</h1>

    <div id="login-container">
        <p style="margin-bottom: 20px; color: #ccc;">ACCESS REQUIRED</p>
        <input type="password" id="pwInput" placeholder="請輸入管理密碼">
        <br>
        <button class="login-btn" onclick="checkAccess()">ENTER SYSTEM</button>
        <div id="loader">正在同步衛星資料...</div>
    </div>

    <div id="main-content"></div>

    <script>
        // --- 核心設定 ---
        const LOGIN_PASSWORD = "0001"; // 在這裡修改進入網頁的密碼
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw1NrppF8bpQSwM70ELil_6jgStTFmxTwMW9VZnPv2qiTki2CwwL_qx1BhDXl540CI7/exec"; 

        function checkAccess() {
            const userIn = document.getElementById('pwInput').value;
            if (userIn === LOGIN_PASSWORD) {
                fetchWifiData();
            } else {
                alert("密碼錯誤，拒絕存取！");
            }
        }

        async function fetchWifiData() {
            document.getElementById('loader').style.display = 'block';
            
            try {
                const response = await fetch(GAS_WEB_APP_URL);
                const json = await response.json();
                
                if (json.success) {
                    showContent(json.data);
                } else {
                    alert("資料抓取失敗");
                }
            } catch (error) {
                alert("連線到 GAS 發生錯誤，請檢查部署網址或權限。");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function showContent(data) {
            document.getElementById('login-container').style.display = 'none';
            const container = document.getElementById('main-content');
            container.style.display = 'flex';
            
            container.innerHTML = '';
            data.forEach(item => {
                // 自動生成 QR Code (WIFI 格式)
                const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=WIFI:S:${item.s};T:WPA;P:${item.p};;`;
                
                const card = document.createElement('div');
                card.className = 'wifi-card';
                card.innerHTML = `
                    <div class="classroom-name">${item.c}</div>
                    <div style="font-size: 0.8em; color: #888;">SSID: ${item.s}</div>
                    <img src="${qrUrl}" class="qr-code" alt="QR Code">
                    <button class="copy-button" onclick="copyPassword('${item.p}')">複製密碼</button>
                `;
                container.appendChild(card);
            });
        }

        function copyPassword(rawPassword) {
            // 保留你貼心的「移除空白」功能
            const cleanPassword = rawPassword.replace(/\s/g, '');
            navigator.clipboard.writeText(cleanPassword).then(() => {
                alert("密碼已複製到剪貼簿 (已自動移除空格)");
            });
        }
    </script>
</body>
</html>
