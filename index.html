<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FJM Wi-Fi 管理系統</title>
    <style>
        /* 1. 星空背景與基礎樣式 */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 2. 登入畫面 (霓虹燈邊框) */
        #login-screen {
            margin-top: 15vh;
            padding: 30px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00f3ff;
            box-shadow: 0 0 15px #00f3ff;
            border-radius: 15px;
            text-align: center;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #00f3ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px #00f3ff;
            transform: scale(1.05);
        }

        /* 3. Wi-Fi 卡片容器 */
        #wifi-container {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            width: 100%;
        }

        /* 4. 霓虹燈卡片設計 */
        .wifi-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
            border-radius: 15px;
            padding: 20px;
            width: 280px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: 0.4s;
        }

        .wifi-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 25px #ff00ff;
        }

        .wifi-card h2 {
            color: #00f3ff;
            margin-top: 0;
        }

        .qr-code {
            margin: 15px 0;
            border: 5px solid white;
            border-radius: 10px;
        }

        .copy-btn {
            background: #ff00ff;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🔐 進入管理系統</h1>
        <p>請輸入管理密碼以查看 Wi-Fi 清單</p>
        <input type="password" id="pwInput" placeholder="請輸入密碼...">
        <button onclick="verifyAndLoad()">送出</button>
    </div>

    <div id="wifi-container"></div>

    <script>
        // 請替換為你的 GAS 網址
        const GAS_URL = "你的_GAS_部署網址";

        async function verifyAndLoad() {
            const pw = document.getElementById('pwInput').value;
            if (!pw) return alert("請輸入密碼！");

            try {
                // 串接 GAS API 並傳入密碼
                const response = await fetch(`${GAS_URL}?pw=${encodeURIComponent(pw)}`);
                const result = await response.json();

                if (result.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    const container = document.getElementById('wifi-container');
                    container.style.display = 'flex';
                    
                    renderCards(result.data);
                } else {
                    alert("密碼錯誤，請重新輸入！");
                }
            } catch (error) {
                console.error("錯誤:", error);
                alert("連線發生問題，請確認 GAS 部署設定。");
            }
        }

        function renderCards(data) {
            const container = document.getElementById('wifi-container');
            container.innerHTML = '';

            data.forEach(i => {
                // 生成 QR Code (WIFI:S:帳號;T:WPA;P:密碼;;)
                const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=150x150&chl=WIFI:S:${i.s};T:WPA;P:${i.p};;`;

                const card = document.createElement('div');
                card.className = 'wifi-card';
                card.innerHTML = `
                    <h2>${i.c}</h2>
                    <p style="font-size: 0.9em; color: #ccc;">SSID: ${i.s}</p>
                    <img src="${qrUrl}" alt="QR Code" class="qr-code">
                    <button class="copy-btn" onclick="copyToClipboard('${i.p}')">📋 複製密碼</button>
                `;
                container.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            // 自動移除空白 (保留你原本貼心的功能)
            const cleanText = text.replace(/\s/g, '');
            navigator.clipboard.writeText(cleanText).then(() => {
                alert("密碼已複製！");
            });
        }
    </script>
</body>
</html>
