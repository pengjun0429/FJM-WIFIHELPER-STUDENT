<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            overflow: hidden; 
        }
        ::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, 0, 0); } 40%, 60% { transform: translate3d(3px, 0, 0); } }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, Fragment } = React;
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5AmcAwSnAOE-Khz9t2dCIzyHugcADSMKJYk4WQGbc3srurSMxIR8DcxNjd6tSchRy/exec";
        const APP_VERSION = "v10.8.5-noauth";

        const Icons = {
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.5a7 7 0 1 0-13.4 3C2.8 13.4 1 15.1 1 17.2 1 19.3 2.7 21 4.8 21h12.7c.3 0 .6-.1.9-.1V19z"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            QrCode: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [copiedId, setCopiedId] = useState(null);
            const [qrModal, setQrModal] = useState({ show: false, ssid: '', pwd: '', c: '' });
            const [isSetupUnlocked, setIsSetupUnlocked] = useState(false);
            const [setupPwd, setSetupPwd] = useState('');
            const [showAccountManager, setShowAccountManager] = useState(false);
            const [whitelist, setWhitelist] = useState([]);
            const [newEmail, setNewEmail] = useState('');

            useEffect(() => {
                fetchWifiData();
                if (sessionStorage.getItem('fjm_setup_auth') === 'true') setIsSetupUnlocked(true);
            }, []);

            const fetchWifiData = () => {
                setLoading(true);
                fetch(GAS_URL).then(r => r.json()).then(j => {
                    if (j.success) setData(j.data);
                    setLoading(false);
                });
            };

            const handleUnlockSetup = () => {
                fetch(`${GAS_URL}?action=verify&pwd=${setupPwd}`)
                    .then(r => r.json())
                    .then(j => {
                        if (j.match) {
                            setIsSetupUnlocked(true);
                            sessionStorage.setItem('fjm_setup_auth', 'true');
                        } else {
                            alert('管理密碼錯誤');
                        }
                    });
            };

            const fetchWhitelist = () => {
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'getWhitelist' }) })
                    .then(r => r.json()).then(j => setWhitelist(j.data || []));
            };

            const handleAddAccount = () => {
                if (!newEmail) return;
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addWhitelist', email: newEmail }) })
                    .then(r => r.json()).then(j => {
                        if (j.status === 'success') { setNewEmail(''); fetchWhitelist(); }
                        else alert(j.message);
                    });
            };

            const filteredData = useMemo(() => {
                const kw = searchTerm.toLowerCase();
                return data.filter(i => (i.s || '').toLowerCase().includes(kw) || (i.c || '').includes(kw));
            }, [searchTerm, data]);

            return (
                <div className="flex justify-center bg-slate-200" style={{ height: '100dvh' }}>
                    <div className="w-full sm:max-w-md bg-[#f8fafc] h-full relative flex flex-col sm:rounded-[2.5rem] overflow-hidden sm:shadow-2xl">
                        
                        {/* Header */}
                        <div className="shrink-0 bg-white border-b border-slate-200 px-6 pt-10 pb-6">
                            <div className="flex justify-between items-center mb-6">
                                <div className="flex items-center gap-3">
                                    <div className="text-blue-600"><Icons.Cloud /></div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">FJM Wi-Fi</h1>
                                </div>
                                <span className="text-[10px] bg-slate-100 text-slate-400 font-black px-2 py-1 rounded-md">FREE ACCESS</span>
                            </div>
                            
                            {activeTab === 'query' && (
                                <div className="relative">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                                    <input 
                                        type="text" 
                                        placeholder="搜尋教室或代號..." 
                                        className="w-full pl-12 pr-4 py-4 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-bold text-xl transition-all"
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            )}
                        </div>

                        {/* 主內容區 */}
                        <div className="flex-1 overflow-hidden relative">
                            {/* 查詢頁 */}
                            <div className={`absolute inset-0 flex flex-col overflow-y-auto p-5 space-y-4 ${activeTab === 'query' ? 'z-10' : 'hidden'}`}>
                                {loading ? (
                                    <div className="flex flex-col items-center py-20 gap-4 opacity-40">
                                        <div className="animate-spin text-blue-600"><Icons.Settings /></div>
                                        <span className="font-black text-xl">連線至雲端資料庫...</span>
                                    </div>
                                ) : (
                                    filteredData.map(i => (
                                        <div key={i.s} className="bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-sm flex justify-between items-center active:scale-[0.98] transition-transform">
                                            <div>
                                                <div className="text-blue-600 font-black text-xl mb-0.5">{i.c}</div>
                                                <div className="text-slate-400 font-mono font-bold">{i.s}</div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setQrModal({show: true, ssid: i.s, pwd: i.p, c: i.c})} className="p-3.5 bg-blue-50 text-blue-600 rounded-2xl active:bg-blue-100"><Icons.QrCode /></button>
                                                <button 
                                                    onClick={() => {
                                                        navigator.clipboard.writeText(i.p.replace(/\s/g,''));
                                                        setCopiedId(i.s);
                                                        setTimeout(() => setCopiedId(null), 1500);
                                                    }}
                                                    className={`p-3.5 rounded-2xl active:scale-95 transition-all ${copiedId === i.s ? 'bg-green-500 text-white shadow-lg shadow-green-200' : 'bg-slate-100 text-slate-600'}`}
                                                >
                                                    {copiedId === i.s ? <Icons.Check /> : <Icons.Copy />}
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {/* 設定頁 */}
                            <div className={`absolute inset-0 flex flex-col overflow-y-auto p-8 ${activeTab === 'setup' ? 'z-10' : 'hidden'}`}>
                                {!isSetupUnlocked ? (
                                    <div className="flex flex-col items-center justify-center h-full gap-8">
                                        <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center shadow-inner"><Icons.Lock /></div>
                                        <div className="w-full space-y-4">
                                            <input 
                                                type="password" 
                                                placeholder="輸入管理密碼" 
                                                className="w-full p-6 bg-white border-2 border-slate-100 rounded-3xl text-center text-3xl font-black outline-none focus:border-blue-500"
                                                value={setupPwd}
                                                onChange={e => setSetupPwd(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && handleUnlockSetup()}
                                            />
                                            <button onClick={handleUnlockSetup} className="w-full py-5 bg-blue-600 text-white rounded-3xl font-black text-xl shadow-lg shadow-blue-200">管理人員驗證</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-end">
                                            <h2 className="text-4xl font-black text-slate-800 tracking-tighter">系統管理</h2>
                                            <span className="text-sm font-bold text-slate-400 mb-1">{APP_VERSION}</span>
                                        </div>
                                        
                                        <button 
                                            onClick={() => { setShowAccountManager(true); fetchWhitelist(); }}
                                            className="w-full py-8 bg-white border-2 border-purple-100 rounded-[2rem] shadow-sm flex items-center justify-center gap-4 text-purple-600 active:bg-purple-50 transition-colors"
                                        >
                                            <Icons.Users />
                                            <span className="text-2xl font-black">管理同步名單</span>
                                        </button>

                                        <div className="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                                            <h3 className="font-black text-indigo-700 text-lg mb-3 flex items-center gap-2"><Icons.Settings /> 同步狀態</h3>
                                            <p className="text-indigo-600 text-sm font-bold leading-relaxed opacity-80">
                                                目前已開啟公開存取。管理人員仍需透過「書籤外掛」將教育局密碼同步至雲端。
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 底部導覽列 */}
                        <div className="shrink-0 bg-white border-t border-slate-100 px-6 pt-4 safe-bottom flex items-center gap-4">
                            <button onClick={() => setActiveTab('query')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all ${activeTab === 'query' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 font-black scale-[1.02]' : 'text-slate-400 font-bold'}`}>
                                <Icons.Search /> 密碼查詢
                            </button>
                            <button onClick={() => setActiveTab('setup')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all ${activeTab === 'setup' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 font-black scale-[1.02]' : 'text-slate-400 font-bold'}`}>
                                <Icons.Settings /> 管理
                            </button>
                        </div>
                    </div>

                    {/* QR Code Modal (同之前版本) */}
                    {qrModal.show && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 animate-fade-in" onClick={() => setQrModal({show:false})}>
                            <div className="bg-white rounded-[3rem] p-10 w-full max-w-sm flex flex-col items-center shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="bg-blue-50 text-blue-600 px-6 py-2 rounded-full font-black text-xl mb-2">{qrModal.c}</div>
                                <h3 className="text-3xl font-black text-slate-800 mb-8 font-mono tracking-wider">{qrModal.ssid}</h3>
                                <div className="bg-slate-50 p-6 rounded-[2.5rem] mb-8 border border-slate-100 shadow-inner">
                                    <img src={`https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodeURIComponent(`WIFI:S:${qrModal.ssid};T:WPA;P:${qrModal.pwd.replace(/\s/g,'')};;`)}`} className="w-56 h-56 mix-blend-multiply" alt="WiFi QR" />
                                </div>
                                <div className="w-full bg-slate-100 py-4 px-6 rounded-2xl mb-8 flex justify-center items-center gap-3">
                                    <span className="text-slate-400 font-bold">密碼:</span>
                                    <span className="text-slate-800 font-black font-mono text-2xl tracking-widest">{qrModal.pwd}</span>
                                </div>
                                <button onClick={() => setQrModal({show:false})} className="w-full py-5 bg-slate-800 text-white rounded-3xl font-black text-xl shadow-xl active:scale-95 transition-all">關閉視窗</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
