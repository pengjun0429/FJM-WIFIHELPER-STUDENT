<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-fade { animation: fade 0.2s ease-out; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .btn-round:active { transform: scale(0.92); transition: 0.1s; }
        .rounded-extra { border-radius: 3.5rem; }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // =====================================
        const ACCESS_KEY = "666888";         
        const ADMIN_PASSWORD = "fjm-300300"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbznzdpUn4W7FNnHWFhVoiRBAHnxYsjnnYqMAafFOxiZf3q7fJM-hu4AMz5vRuAZpa-b/exec";
        // =====================================

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false); // 管理員二次驗證狀態
            const [skipLoginMode, setSkipLoginMode] = useState(false);
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminVerifyInput, setAdminVerifyInput] = useState(''); 
            const [showVerifyModal, setShowVerifyModal] = useState(false); 
            const [pendingAction, setPendingAction] = useState(null); 
            const [copied, setCopied] = useState(null);
            const [visiblePwds, setVisiblePwds] = useState({});

            const fetchFromGAS = useCallback(async (params = "") => {
                try {
                    const response = await fetch(`${GAS_URL}${params}`, { method: 'GET', redirect: 'follow' });
                    return await response.json();
                } catch (e) { return null; }
            }, []);

            useEffect(() => {
                const init = async () => {
                    const config = await fetchFromGAS("?action=getConfig");
                    if (config) {
                        setSkipLoginMode(config.skipLogin);
                        if (config.skipLogin === true || sessionStorage.getItem('fjm_access') === 'true') {
                            setIsAccess(true);
                        }
                    }
                    setLoading(false);
                };
                init();
            }, [fetchFromGAS]);

            useEffect(() => {
                if (isAccess) {
                    fetchFromGAS().then(res => { if (res && res.success) setData(res.data); });
                }
            }, [isAccess, fetchFromGAS]);

            // 請求執行需要管理員權限的動作
            const requestAdminAction = (action) => {
                if (isAdminAuth) {
                    action();
                } else {
                    setPendingAction(() => action);
                    setShowVerifyModal(true);
                }
            };

            const confirmAdminVerify = () => {
                if (adminVerifyInput === ADMIN_PASSWORD) {
                    setIsAdminAuth(true);
                    setShowVerifyModal(false);
                    setAdminVerifyInput('');
                    if (pendingAction) pendingAction();
                } else {
                    alert("管理員密碼錯誤");
                }
            };

            const filtered = data.filter(i => (String(i.c) + String(i.s)).toLowerCase().includes(searchTerm.toLowerCase()));

            if (loading && !isAccess) return <div className="h-screen flex items-center justify-center font-black text-slate-300 animate-pulse text-xl tracking-widest uppercase">FJM CLOUD...</div>;

            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-8 animate-pop">
                        <div className="w-full max-w-sm bg-white rounded-extra p-12 shadow-2xl flex flex-col items-center gap-10">
                            <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg">
                                <svg className="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            </div>
                            <h2 className="text-4xl font-black text-slate-800 tracking-tighter text-center">存取認證</h2>
                            <input type="password" 
                                className="w-full p-8 bg-slate-50 border-none rounded-full text-center text-4xl font-black outline-none focus:ring-4 ring-indigo-500/10"
                                value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('錯誤'))} placeholder="••••" 
                            />
                            <button onClick={() => passInput === ACCESS_KEY ? (setIsAccess(true), sessionStorage.setItem('fjm_access', 'true')) : alert('錯誤')} className="w-full py-6 bg-slate-900 text-white rounded-full font-black text-xl btn-round shadow-lg transition-all">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh] relative">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative overflow-hidden">
                        
                        <div className="px-10 pt-16 pb-8 border-b border-slate-50">
                            <div className="flex justify-between items-center mb-8">
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter">Wi-Fi 密碼庫</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 font-black text-[10px] btn-round tracking-tighter uppercase">Logout</button>
                            </div>
                            <input type="text" placeholder="搜尋教室..." 
                                className="w-full px-8 py-5 bg-slate-100 rounded-full border-none font-bold outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all text-lg"
                                value={searchTerm} onChange={e => setSearchTerm(e.target.value)} 
                            />
                        </div>

                        <div className="flex-1 overflow-y-auto bg-slate-50/50">
                            <div className="p-6 space-y-5">
                                {data.length === 0 && <div className="text-center py-20 text-slate-300 font-bold animate-pulse">連線雲端資料中...</div>}
                                {filtered.map(i => (
                                    <div key={i.s} className="p-8 bg-white rounded-extra border border-slate-100 shadow-sm animate-pop">
                                        <div className="flex justify-between items-center mb-6">
                                            <div>
                                                <div className="text-indigo-600 font-black text-3xl tracking-tighter">{i.c}</div>
                                                <div className="text-slate-400 font-mono font-bold text-xs mt-1 tracking-widest uppercase">{i.s}</div>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => requestAdminAction(() => setVisiblePwds(p => ({...p, [i.s]: !p[i.s]})))} 
                                                    className={`px-6 py-4 rounded-full font-black text-xs transition-all btn-round ${visiblePwds[i.s] ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}`}>
                                                    {visiblePwds[i.s] ? '收起' : '顯示'}
                                                </button>
                                                <button onClick={() => requestAdminAction(() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 1000); })}
                                                    className={`w-14 h-14 rounded-full flex items-center justify-center transition-all btn-round ${copied === i.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-100 text-slate-600'}`}>
                                                    {copied === i.s ? '✓' : <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="14" x="8" y="8" rx="4" ry="4"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>}
                                                </button>
                                            </div>
                                        </div>
                                        {visiblePwds[i.s] && <div className="w-full py-5 bg-indigo-50 rounded-[2.5rem] text-indigo-700 font-black text-center text-3xl tracking-widest animate-pop">{i.p}</div>}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="px-12 py-8 safe-bottom bg-white border-t border-slate-50 text-center">
                            <p className="text-slate-300 font-black text-[10px] tracking-[0.2em] uppercase leading-none">Powered by FJM System</p>
                        </div>
                    </div>

                    {/* 管理員二次驗證彈窗 */}
                    {showVerifyModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-8 bg-slate-900/60 backdrop-blur-sm animate-fade">
                            <div className="w-full max-w-xs bg-white rounded-extra p-10 shadow-2xl animate-pop flex flex-col items-center gap-8 text-center">
                                <div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">管理員驗證</h3>
                                    <p className="text-slate-400 text-[10px] font-bold mt-1 uppercase tracking-widest">Admin Check Required</p>
                                </div>
                                <input type="password" autoFocus
                                    className="w-full p-6 bg-slate-100 border-none rounded-full text-center text-3xl font-black outline-none focus:ring-4 ring-indigo-500/10"
                                    value={adminVerifyInput} onChange={e => setAdminVerifyInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && confirmAdminVerify()} placeholder="••••" 
                                />
                                <div className="flex gap-4 w-full">
                                    <button onClick={() => {setShowVerifyModal(false); setAdminVerifyInput('');}} className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-full font-black btn-round text-sm">取消</button>
                                    <button onClick={confirmAdminVerify} className="flex-1 py-4 bg-indigo-600 text-white rounded-full font-black shadow-lg btn-round text-sm">確認</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
