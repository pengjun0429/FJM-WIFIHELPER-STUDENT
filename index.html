<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .rounded-extra { border-radius: 3.5rem; }
        @keyframes pop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .btn-active:active { transform: scale(0.92); transition: 0.1s; }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const ADMIN_PASSWORD = "fjm-300300"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxzbEuLi5XQzzJW3sCU82guqVWuf5hy_Pt_ehKurftSqK3LkLoJAM7a1bfw-bxTt9MH/exec";

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [activeTab, setActiveTab] = useState('query');
            const [config, setConfig] = useState({ skipLogin: false, accessKey: "666888" });
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [newAccessKey, setNewAccessKey] = useState('');
            const [updating, setUpdating] = useState(false);

            const fetchGAS = useCallback(async (p = "") => {
                try {
                    const r = await fetch(`${GAS_URL}${p}`, { method: 'GET', redirect: 'follow' });
                    return await r.json();
                } catch (e) { return null; }
            }, []);

            useEffect(() => {
                fetchGAS("?action=getConfig").then(res => {
                    if (res) {
                        setConfig(res);
                        setNewAccessKey(res.accessKey);
                        if (res.skipLogin || sessionStorage.getItem('fjm_ok') === 'true') setIsAccess(true);
                    }
                    setLoading(false);
                });
            }, [fetchGAS]);

            useEffect(() => {
                if (isAccess) fetchGAS().then(res => { if (res?.success) setData(res.data); });
            }, [isAccess, fetchGAS]);

            const updateConfig = async (params) => {
                setUpdating(true);
                const res = await fetchGAS(`?action=updateConfig&pwd=${ADMIN_PASSWORD}${params}`);
                if (res?.success) alert("同步成功");
                else alert("失敗：" + res?.msg);
                setUpdating(false);
            };

            if (loading) return null;

            if (!isAccess) {
                return (
                    <div className="h-screen flex items-center justify-center p-8 animate-pop">
                        <div className="w-full max-w-sm bg-white rounded-extra p-12 shadow-2xl flex flex-col items-center gap-10">
                            <h2 className="text-4xl font-black text-slate-800">FJM 認證</h2>
                            <input type="password" className="w-full p-8 bg-slate-50 rounded-full text-center text-4xl font-black outline-none focus:ring-4 ring-indigo-500/10"
                                value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (passInput === config.accessKey ? (setIsAccess(true), sessionStorage.setItem('fjm_ok', 'true')) : alert('密碼錯誤'))} placeholder="••••" />
                            <button onClick={() => passInput === config.accessKey ? (setIsAccess(true), sessionStorage.setItem('fjm_ok', 'true')) : alert('密碼錯誤')} className="w-full py-6 bg-slate-900 text-white rounded-full font-black text-xl btn-active">進入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative">
                        <div className="px-10 pt-16 pb-8 border-b border-slate-50 flex justify-between items-center">
                            <h1 className="text-3xl font-black text-slate-800 uppercase tracking-tighter">{activeTab === 'query' ? 'Wi-Fi' : 'Admin'}</h1>
                            <button onClick={() => {sessionStorage.clear(); location.reload();}} className="text-slate-300 font-bold text-xs uppercase">Logout</button>
                        </div>

                        <div className="flex-1 overflow-y-auto bg-slate-50/50 p-6">
                            {activeTab === 'query' ? (
                                <div className="space-y-4">
                                    {data.map(i => (
                                        <div key={i.s} className="p-8 bg-white rounded-extra border border-slate-100 shadow-sm animate-pop flex justify-between items-center">
                                            <div><div className="text-indigo-600 font-black text-3xl">{i.c}</div><div className="text-slate-400 text-xs font-bold uppercase">{i.s}</div></div>
                                            <button onClick={() => alert(`密碼是: ${i.p}`)} className="px-6 py-4 bg-slate-100 rounded-full font-black text-xs btn-active text-slate-500 tracking-widest">查看</button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="p-4 space-y-8 animate-pop">
                                    {!isAdmin ? (
                                        <div className="text-center space-y-8 mt-20">
                                            <h3 className="text-2xl font-black">後台驗證</h3>
                                            <input type="password" placeholder="管理員密碼" className="w-full p-6 bg-white rounded-full text-center text-3xl font-black outline-none shadow-sm"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('密碼錯誤'))} />
                                            <button onClick={() => adminInput === ADMIN_PASSWORD ? setIsAdmin(true) : alert('密碼錯誤')} className="w-full py-5 bg-indigo-600 text-white rounded-full font-black btn-active">認證</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className="p-10 bg-white rounded-extra shadow-sm border border-slate-100 space-y-6">
                                                <h4 className="font-black text-slate-800">修改進入密碼</h4>
                                                <input type="text" value={newAccessKey} onChange={e => setNewAccessKey(e.target.value)} className="w-full p-5 bg-slate-50 rounded-full text-center font-black text-2xl outline-none ring-indigo-500/10 focus:ring-4" />
                                                <button onClick={() => updateConfig(`&accessKey=${newAccessKey}`)} className="w-full py-4 bg-slate-900 text-white rounded-full font-black btn-active">儲存新密碼</button>
                                            </div>
                                            <div className="p-10 bg-white rounded-extra shadow-sm border border-slate-100 flex justify-between items-center">
                                                <span className="font-black">全域免登入模式</span>
                                                <button onClick={() => { const target = !config.skipLogin; setConfig({...config, skipLogin: target}); updateConfig(`&skipLogin=${target}`); }} 
                                                    className={`w-16 h-8 rounded-full transition-all relative ${config.skipLogin ? 'bg-green-500' : 'bg-slate-200'}`}>
                                                    <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${config.skipLogin ? 'right-1' : 'left-1'}`}></div>
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="px-12 pt-6 pb-12 bg-white border-t border-slate-50 flex gap-8">
                            <button onClick={() => setActiveTab('query')} className={`flex-1 py-6 rounded-full font-black btn-active ${activeTab === 'query' ? 'bg-slate-900 text-white shadow-xl scale-105' : 'text-slate-400'}`}>密碼庫</button>
                            <button onClick={() => setActiveTab('setup')} className={`flex-1 py-6 rounded-full font-black btn-active ${activeTab === 'setup' ? 'bg-slate-900 text-white shadow-xl scale-105' : 'text-slate-400'}`}>管理員</button>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
