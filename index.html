<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // =====================================
        // 🛠️ 核心設定區
        // =====================================
        const ACCESS_KEY = "666888";         // 預設進入密碼
        const ADMIN_PASSWORD = "fjm-300300"; // 管理員專用密碼
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwxevu6vFcL418-hEdLcVo9zsGGeNUFArv8Rmg2U7K1iigIwCpZFeCuT3LcS_h-7I4/exec";
        // =====================================

        const Icons = {
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>
        };

        function App() {
            const [isAccess, setIsAccess] = useState(false);
            const [isAdmin, setIsAdmin] = useState(sessionStorage.getItem('fjm_admin') === 'true');
            const [skipLoginMode, setSkipLoginMode] = useState(false);
            
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [copied, setCopied] = useState(null);
            const [visiblePwds, setVisiblePwds] = useState({});

            // 1. 初始化檢查全域免登狀態
            useEffect(() => {
                fetch(`${GAS_URL}?action=getConfig`)
                    .then(r => r.json())
                    .then(config => {
                        const isSkip = config.skipLogin === true;
                        setSkipLoginMode(isSkip);
                        if (isSkip || sessionStorage.getItem('fjm_access') === 'true') {
                            setIsAccess(true);
                        }
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            // 2. 當權限開啟時抓取 Wi-Fi 清單
            useEffect(() => {
                if (isAccess) {
                    fetch(GAS_URL).then(r => r.json()).then(j => {
                        if (j.success) setData(j.data);
                    });
                }
            }, [isAccess]);

            const handleAccessVerify = () => {
                if (passInput === ACCESS_KEY) {
                    setIsAccess(true);
                    sessionStorage.setItem('fjm_access', 'true');
                } else {
                    alert('進入密碼錯誤！');
                    setPassInput('');
                }
            };

            const toggleGlobalSkip = () => {
                const nextMode = !skipLoginMode;
                fetch(`${GAS_URL}?action=updateConfig&skipLogin=${nextMode}&pwd=${ADMIN_PASSWORD}`)
                    .then(r => r.json())
                    .then(res => {
                        if (res.success) {
                            setSkipLoginMode(nextMode);
                            alert(`全域免登入已${nextMode ? '開啟' : '關閉'}`);
                        } else {
                            alert('儲存失敗：' + res.msg);
                        }
                    });
            };

            const filtered = data.filter(i => (i.c+i.s).toLowerCase().includes(searchTerm.toLowerCase()));

            if (loading && !isAccess) {
                return <div className="h-screen w-full flex items-center justify-center bg-slate-100 font-black text-slate-400 animate-pulse text-xl">FJM CLOUD 連線中...</div>;
            }

            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-6 bg-slate-100 animate-in">
                        <div className="w-full max-w-sm bg-white rounded-[3.5rem] p-12 shadow-2xl flex flex-col items-center gap-10">
                            <div className="w-24 h-24 bg-indigo-600 text-white rounded-[2.5rem] flex items-center justify-center shadow-xl shadow-indigo-100"><Icons.Lock /></div>
                            <div className="text-center space-y-2">
                                <h2 className="text-4xl font-black text-slate-800 tracking-tighter">FJM Wi-Fi</h2>
                                <p className="text-slate-400 font-bold">請輸入存取密碼以繼續</p>
                            </div>
                            <input type="password" className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-center text-4xl font-black focus:border-indigo-500 transition-all outline-none"
                                value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAccessVerify()} placeholder="••••" />
                            <button onClick={handleAccessVerify} className="w-full py-6 bg-slate-900 text-white rounded-[2rem] font-black text-xl active:scale-95 transition-all shadow-xl shadow-slate-200">登入系統</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative">
                        
                        {/* Header */}
                        <div className="px-6 pt-12 pb-6 border-b border-slate-50">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">FJM Wi-Fi</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="px-4 py-2 bg-slate-100 text-slate-500 text-[10px] font-black rounded-full uppercase tracking-widest">Logout</button>
                            </div>
                            {activeTab === 'query' && (
                                <input type="text" placeholder="搜尋教室..." className="w-full px-6 py-4 bg-slate-100 rounded-2xl border-none font-bold outline-none focus:ring-2 ring-indigo-500/10 focus:bg-white transition-all text-lg"
                                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                            )}
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/30">
                            {activeTab === 'query' ? (
                                <div className="p-4 space-y-4">
                                    {filtered.length === 0 && !loading && <div className="text-center py-20 text-slate-300 font-bold">找不到相關教室資料</div>}
                                    {filtered.map(i => (
                                        <div key={i.s} className="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm animate-in">
                                            <div className="flex justify-between items-start mb-5">
                                                <div>
                                                    <div className="text-indigo-600 font-black text-2xl leading-none">{i.c}</div>
                                                    <div className="text-slate-400 font-mono font-bold text-[10px] mt-2 tracking-wider">{i.s}</div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setVisiblePwds(p => ({...p, [i.s]: !p[i.s]}))} className={`p-4 rounded-2xl transition-all ${visiblePwds[i.s] ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}><Icons.Eye /></button>
                                                    <button onClick={() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 2000); }}
                                                        className={`p-4 rounded-2xl transition-all ${copied === i.s ? 'bg-green-500 text-white shadow-lg' : 'bg-slate-50 text-slate-600'}`}>
                                                        {copied === i.s ? <Icons.Check /> : <Icons.Copy />}
                                                    </button>
                                                </div>
                                            </div>
                                            {visiblePwds[i.s] && (
                                                <div className="w-full py-4 bg-indigo-50 rounded-2xl border border-indigo-100 text-indigo-700 font-black text-center text-xl tracking-[0.2em] animate-in">
                                                    {i.p}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full p-8 flex flex-col">
                                    {!isAdmin ? (
                                        <div className="my-auto space-y-8 animate-in">
                                            <div className="text-center space-y-2">
                                                <h3 className="text-3xl font-black text-slate-800 tracking-tight">管理員認證</h3>
                                                <p className="text-slate-400 font-bold">請輸入後端權限金鑰</p>
                                            </div>
                                            <input type="password" placeholder="••••••••" className="w-full p-6 bg-white border-2 border-slate-200 rounded-[2rem] text-center text-3xl font-black outline-none focus:border-indigo-600 transition-all"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (adminInput === ADMIN_PASSWORD ? (setIsAdmin(true), sessionStorage.setItem('fjm_admin', 'true')) : alert('錯誤'))} />
                                            <button onClick={() => adminInput === ADMIN_PASSWORD ? (setIsAdmin(true), sessionStorage.setItem('fjm_admin', 'true')) : alert('錯誤')} className="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">進入後台系統</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6 animate-in">
                                            <h2 className="text-3xl font-black text-slate-800 tracking-tight">系統設定</h2>
                                            <div className="p-8 bg-white border-2 border-slate-50 rounded-[2.5rem] shadow-sm space-y-8">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <div className="text-xl font-black text-slate-800 tracking-tight">全域免登入模式</div>
                                                        <div className="text-sm text-slate-400 font-bold mt-1">開啟後所有人皆不需輸入密碼</div>
                                                    </div>
                                                    <button onClick={toggleGlobalSkip} className={`w-16 h-9 rounded-full relative transition-all shadow-inner ${skipLoginMode ? 'bg-green-500' : 'bg-slate-200'}`}>
                                                        <div className={`absolute top-1.5 w-6 h-6 bg-white rounded-full shadow-md transition-all ${skipLoginMode ? 'right-1.5' : 'left-1.5'}`}></div>
                                                    </button>
                                                </div>
                                                <div className="p-5 bg-amber-50 rounded-3xl border border-amber-100">
                                                    <p className="text-amber-700 text-xs font-bold leading-relaxed">
                                                        警告：此操作將會即時影響所有正在使用網頁的使用者權限。
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Footer Tabs */}
                        <div className="px-6 pt-4 pb-8 safe-bottom bg-white border-t border-slate-50 flex gap-4">
                            <button onClick={() => setActiveTab('query')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all ${activeTab === 'query' ? 'bg-slate-900 text-white shadow-xl shadow-slate-200 font-black' : 'text-slate-400 font-bold hover:bg-slate-50'}`}>
                                <Icons.Search /> 密碼庫
                            </button>
                            <button onClick={() => setActiveTab('setup')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all ${activeTab === 'setup' ? 'bg-slate-900 text-white shadow-xl shadow-slate-200 font-black' : 'text-slate-400 font-bold hover:bg-slate-50'}`}>
                                <Icons.Settings /> 管理
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
