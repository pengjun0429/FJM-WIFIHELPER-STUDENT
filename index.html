<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; overflow: hidden; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
        .toggle-checkbox:checked { right: 0; border-color: #2563eb; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzcpT4j-XZdcjJBlLTsCNTG8rXZAnboShff0vJuL2zZMNZZX_r4K7D--Zh2xnv_Cs3i/exec"; // 請替換為您的部署網址

        const Icons = {
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        };

        function App() {
            const [isAppLocked, setIsAppLocked] = useState(true);
            const [isSetupUnlocked, setIsSetupUnlocked] = useState(false);
            const [isVerifyEnabled, setIsVerifyEnabled] = useState(true);
            const [inputPwd, setInputPwd] = useState('');
            const [activeTab, setActiveTab] = useState('query');

            // 初始化：檢查是否需要驗證及登入狀態
            useEffect(() => {
                fetch(`${GAS_URL}?action=getSettings`)
                    .then(r => r.json())
                    .then(j => {
                        setIsVerifyEnabled(j.verifyEnabled);
                        // 如果驗證關閉，或者 session 已解鎖，則不鎖定 App
                        if (!j.verifyEnabled || sessionStorage.getItem('fjm_app_auth') === 'true') {
                            setIsAppLocked(false);
                        }
                    });
                if (sessionStorage.getItem('fjm_setup_auth') === 'true') setIsSetupUnlocked(true);
            }, []);

            // 處理進入 App 的驗證
            const handleAppUnlock = () => {
                fetch(`${GAS_URL}?action=verify&pwd=${inputPwd}`)
                    .then(r => r.json())
                    .then(j => {
                        if (j.match) {
                            setIsAppLocked(false);
                            sessionStorage.setItem('fjm_app_auth', 'true');
                            setInputPwd('');
                        } else {
                            alert('密碼錯誤');
                        }
                    });
            };

            // 處理進入管理員模式的驗證
            const handleSetupUnlock = () => {
                fetch(`${GAS_URL}?action=verify&pwd=${inputPwd}`)
                    .then(r => r.json())
                    .then(j => {
                        if (j.match) {
                            setIsSetupUnlocked(true);
                            sessionStorage.setItem('fjm_setup_auth', 'true');
                            setInputPwd('');
                        } else {
                            alert('密碼錯誤');
                        }
                    });
            };

            // 切換驗證開關 (僅管理員可用)
            const toggleVerify = (enabled) => {
                setIsVerifyEnabled(enabled);
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'toggleVerify', enabled: enabled })
                });
            };

            // 鎖定介面渲染 (全螢幕鎖定)
            if (isAppLocked && isVerifyEnabled) {
                return (
                    <div className="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center p-8 z-[500]">
                        <div className="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20">
                            <Icons.Lock />
                        </div>
                        <h1 className="text-white text-2xl font-black mb-8 tracking-wider">FJM 雲端系統已鎖定</h1>
                        <input 
                            type="password" 
                            className="w-full max-w-xs p-5 bg-white/10 border border-white/20 rounded-2xl text-white text-center text-2xl outline-none focus:border-blue-500 transition-all"
                            placeholder="請輸入進入密碼"
                            value={inputPwd}
                            onChange={e => setInputPwd(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && handleAppUnlock()}
                        />
                        <button onClick={handleAppUnlock} className="mt-4 w-full max-w-xs py-4 bg-blue-600 text-white rounded-2xl font-black text-lg">解鎖進入</button>
                    </div>
                );
            }

            return (
                <div className="flex justify-center bg-slate-200 h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full relative flex flex-col overflow-hidden">
                        {/* 頁首... (略，保持原本樣式) */}
                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <span className="text-xl font-black text-slate-800">FJM Wi-Fi</span>
                            <div className="text-blue-600"><Icons.Shield /></div>
                        </div>

                        {/* 內容區塊 */}
                        <div className="flex-1 overflow-y-auto p-6">
                            {activeTab === 'query' ? (
                                <div className="text-center py-20 text-slate-400 font-bold">Wi-Fi 清單載入中...</div>
                            ) : (
                                <div className="space-y-6">
                                    {!isSetupUnlocked ? (
                                        <div className="space-y-4">
                                            <h3 className="text-center font-black">管理員驗證</h3>
                                            <input type="password" placeholder="管理密碼" className="w-full p-4 border rounded-xl" value={inputPwd} onChange={e=>setInputPwd(e.target.value)} />
                                            <button onClick={handleSetupUnlock} className="w-full py-4 bg-slate-800 text-white rounded-xl font-bold">進入管理模式</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6 animate-fade-in">
                                            <div className="bg-blue-50 p-6 rounded-3xl flex items-center justify-between border-2 border-blue-100">
                                                <div>
                                                    <div className="font-black text-blue-900">啟動進入密碼</div>
                                                    <div className="text-sm text-blue-700">關閉後任何人皆可直接查看</div>
                                                </div>
                                                <button 
                                                    onClick={() => toggleVerify(!isVerifyEnabled)}
                                                    className={`w-14 h-8 rounded-full transition-all relative ${isVerifyEnabled ? 'bg-blue-600' : 'bg-slate-300'}`}
                                                >
                                                    <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${isVerifyEnabled ? 'left-7' : 'left-1'}`} />
                                                </button>
                                            </div>
                                            {/* 其他管理功能... */}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 導覽列 */}
                        <div className="flex border-t safe-bottom bg-white">
                            <button onClick={()=>setActiveTab('query')} className={`flex-1 py-4 font-black ${activeTab === 'query' ? 'text-blue-600' : 'text-slate-400'}`}>查詢</button>
                            <button onClick={()=>setActiveTab('setup')} className={`flex-1 py-4 font-black ${activeTab === 'setup' ? 'text-blue-600' : 'text-slate-400'}`}>管理</button>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
