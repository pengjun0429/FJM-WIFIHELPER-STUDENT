<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FJM Cloud Wi-Fi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // =====================================
        // 🛠️ 核心密碼自訂區 (請在此修改)
        // =====================================
        const ACCESS_KEY = "666888";         // 👈 進入網頁查看 Wi-Fi 的密碼
        const ADMIN_PASSWORD = "fjm-300300";   // 👈 進入管理分頁同步資料的密碼
        const SKIP_LOGIN = false;            // 👈 設為 true 可跳過第一次登入
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5AmcAwSnAOE-Khz9t2dCIzyHugcADSMKJYk4WQGbc3srurSMxIR8DcxNjd6tSchRy/exec";
        // =====================================

        const Icons = {
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        };

        function App() {
            const [isAccess, setIsAccess] = useState(SKIP_LOGIN || sessionStorage.getItem('fjm_access') === 'true');
            const [isAdmin, setIsAdmin] = useState(sessionStorage.getItem('fjm_admin') === 'true');
            const [activeTab, setActiveTab] = useState('query');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [passInput, setPassInput] = useState('');
            const [adminInput, setAdminInput] = useState('');
            const [copied, setCopied] = useState(null);

            useEffect(() => {
                if (isAccess) {
                    setLoading(true);
                    fetch(GAS_URL).then(r => r.json()).then(j => {
                        if (j.success) setData(j.data);
                        setLoading(false);
                    });
                }
            }, [isAccess]);

            const handleAccess = () => {
                if (passInput === ACCESS_KEY) {
                    setIsAccess(true);
                    sessionStorage.setItem('fjm_access', 'true');
                } else {
                    alert('進入密碼錯誤！');
                    setPassInput('');
                }
            };

            const handleAdmin = () => {
                if (adminInput === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    sessionStorage.setItem('fjm_admin', 'true');
                } else {
                    alert('管理密碼錯誤！');
                    setAdminInput('');
                }
            };

            const filtered = data.filter(i => (i.c+i.s).toLowerCase().includes(searchTerm.toLowerCase()));

            // 1. 登入鎖定介面
            if (!isAccess) {
                return (
                    <div className="h-screen w-full flex items-center justify-center p-6 bg-slate-100">
                        <div className="w-full max-w-sm bg-white rounded-[3rem] p-10 shadow-2xl flex flex-col items-center gap-8 animate-[fadeIn_0.5s_ease-out]">
                            <div className="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                <Icons.Lock />
                            </div>
                            <div className="text-center">
                                <h2 className="text-3xl font-black text-slate-800 tracking-tight">FJM Cloud</h2>
                                <p className="text-slate-400 font-bold mt-1">請輸入存取密碼</p>
                            </div>
                            <input 
                                type="password" 
                                className="w-full p-6 bg-slate-50 border-2 border-slate-100 rounded-3xl text-center text-4xl font-black focus:border-indigo-500 focus:bg-white transition-all outline-none"
                                value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAccess()} placeholder="••••"
                            />
                            <button onClick={handleAccess} className="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-xl hover:bg-slate-800 active:scale-95 transition-all">進入系統</button>
                        </div>
                    </div>
                );
            }

            // 2. 主程式介面
            return (
                <div className="flex justify-center h-[100dvh]">
                    <div className="w-full sm:max-w-md bg-white h-full flex flex-col shadow-2xl relative">
                        
                        {/* Header */}
                        <div className="px-6 pt-12 pb-6 border-b border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">FJM Wi-Fi</h1>
                                <button onClick={() => {sessionStorage.clear(); location.reload();}} className="px-4 py-2 bg-slate-100 text-slate-500 text-xs font-black rounded-full active:bg-red-50 active:text-red-500">登出</button>
                            </div>
                            {activeTab === 'query' && (
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"><Icons.Search /></div>
                                    <input 
                                        type="text" placeholder="搜尋教室..." 
                                        className="w-full pl-12 pr-4 py-4 bg-slate-100 rounded-2xl border-none font-bold outline-none ring-2 ring-transparent focus:ring-indigo-500/20 focus:bg-white transition-all"
                                        value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            )}
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto bg-slate-50/50">
                            {activeTab === 'query' ? (
                                <div className="p-4 space-y-3">
                                    {loading ? <div className="text-center py-20 text-slate-300 font-black animate-pulse">更新密碼庫中...</div> : 
                                    filtered.map(i => (
                                        <div key={i.s} className="p-5 bg-white rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center animate-[fadeIn_0.3s_ease-out]">
                                            <div>
                                                <div className="text-indigo-600 font-black text-xl leading-tight">{i.c}</div>
                                                <div className="text-slate-400 font-mono font-bold text-xs mt-1">{i.s}</div>
                                            </div>
                                            <button 
                                                onClick={() => { navigator.clipboard.writeText(i.p.trim()); setCopied(i.s); setTimeout(() => setCopied(null), 2000); }}
                                                className={`px-6 py-3 rounded-2xl font-black text-sm transition-all ${copied === i.s ? 'bg-green-500 text-white' : 'bg-slate-100 text-slate-600 active:bg-slate-200'}`}
                                            >
                                                {copied === i.s ? <Icons.Check /> : '複製'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col p-8">
                                    {!isAdmin ? (
                                        <div className="my-auto space-y-8 animate-[fadeIn_0.4s_ease-out]">
                                            <div className="text-center font-black text-slate-800 text-3xl">管理員認證</div>
                                            <input 
                                                type="password" placeholder="輸入管理密碼" 
                                                className="w-full p-6 bg-white border-2 border-slate-200 rounded-3xl text-center text-3xl font-black outline-none focus:border-indigo-600"
                                                value={adminInput} onChange={e => setAdminInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdmin()}
                                            />
                                            <button onClick={handleAdmin} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-lg">進入後台</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6 animate-[fadeIn_0.4s_ease-out]">
                                            <h2 className="text-3xl font-black text-slate-800">系統後台</h2>
                                            <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-[2rem] text-indigo-700 font-bold">
                                                ✅ 雲端同步功能正常運作中
                                            </div>
                                            <p className="text-slate-400 text-sm font-bold px-2">您可以透過書籤小工具，將教育局的資料推送到此處。</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Tab Bar */}
                        <div className="px-6 pt-4 safe-bottom bg-white border-t border-slate-100 flex gap-4">
                            <button onClick={() => setActiveTab('query')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all ${activeTab === 'query' ? 'bg-indigo-600 text-white shadow-lg font-black' : 'text-slate-400 font-bold'}`}>
                                <Icons.Search /> 密碼查詢
                            </button>
                            <button onClick={() => setActiveTab('setup')} className={`flex-1 py-4 rounded-2xl flex items-center justify-center gap-2 transition-all ${activeTab === 'setup' ? 'bg-indigo-600 text-white shadow-lg font-black' : 'text-slate-400 font-bold'}`}>
                                <Icons.Settings /> 系統管理
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
